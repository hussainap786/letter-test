<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A Special Delivery</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+CiAgPHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTQiIGZpbGw9IiMxYjFmM2IiLz4KICA8cGF0aCBkPSJNMzIgNDYgQzE4IDM2IDEyIDI4IDEyIDIwIEMxMiAxMyAxOCA5IDI0IDEyIEMyOCAxNCAzMCAxOCAzMiAyMiBDMzQgMTggMzYgMTQgNDAgMTIgQzQ2IDkgNTIgMTMgNTIgMjAgQzUyIDI4IDQ2IDM2IDMyIDQ2IFoiCiAgICAgICAgZmlsbD0iI2U4YjdjMiIvPgo8L3N2Zz4K">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- reusable illustrations, defined once, drawn wherever <use> points to them.
     nothing here is a separate file — it all lives inside this one HTML doc. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="lily-bouquet" viewBox="0 0 240 280">
      <defs>
        <linearGradient id="petalFill" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#e85c8a"/>
          <stop offset="55%" stop-color="#f593b5"/>
          <stop offset="100%" stop-color="#fddce8"/>
        </linearGradient>
        <linearGradient id="wrapFill" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fbe1e8"/>
          <stop offset="100%" stop-color="#f4b8cb"/>
        </linearGradient>
      </defs>

      <!-- fern greenery, tucked behind the blooms -->
      <g stroke="#6f9a63" stroke-width="2" fill="none" opacity="0.8">
        <path d="M75,150 C65,120 55,95 40,72"/>
        <path d="M75,150 C70,120 66,98 58,78" stroke-width="1.2"/>
        <path d="M165,150 C175,120 185,95 200,72"/>
        <path d="M165,150 C170,120 174,98 182,78" stroke-width="1.2"/>
        <path d="M120,140 C118,105 118,75 120,45"/>
      </g>

      <!-- short stems, just enough to lead into the paper wrap below -->
      <path d="M120,190 C119,198 118,206 118,214" stroke="#6f9a63" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M95,185 C93,196 92,206 93,216" stroke="#6f9a63" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M145,185 C147,196 148,206 147,216" stroke="#6f9a63" stroke-width="4" fill="none" stroke-linecap="round"/>

      <!-- paper wrap cone, sits in front of the stem bases -->
      <path d="M60,175 L30,270 L120,235 L210,270 L180,175 Z" fill="url(#wrapFill)"/>
      <path d="M60,175 L30,270 L75,240 L90,178 Z" fill="#ffffff" opacity="0.25"/>
      <path d="M180,175 L210,270 L165,240 L150,178 Z" fill="#00000010"/>

      <!-- ribbon bow, tied over the wrap -->
      <ellipse cx="120" cy="238" rx="10" ry="9" fill="#d94f7c"/>
      <path d="M120,238 C95,222 78,228 68,244 C82,254 104,250 120,238 Z" fill="#ea79a1"/>
      <path d="M120,238 C145,222 162,228 172,244 C158,254 136,250 120,238 Z" fill="#ea79a1"/>
      <path d="M112,244 L96,266 L110,262 Z" fill="#d94f7c"/>
      <path d="M128,244 L144,266 L130,262 Z" fill="#d94f7c"/>

      <!-- three stargazer-style lily blooms, up front -->
      <g transform="translate(72,95) rotate(-16)">
        <g id="bloom">
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(0)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(60)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(120)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(180)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(240)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(300)"/>
          <circle cx="-3" cy="-14" r="1.4" fill="#a8305c"/><circle cx="4" cy="-20" r="1.2" fill="#a8305c"/><circle cx="-6" cy="-24" r="1.1" fill="#a8305c"/>
        </g>
        <circle cx="0" cy="0" r="7" fill="#f2a44c"/>
      </g>

      <g transform="translate(122,58) scale(1.18)">
        <g>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(0)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(60)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(120)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(180)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(240)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="36" fill="url(#petalFill)" transform="rotate(300)"/>
          <circle cx="-3" cy="-14" r="1.4" fill="#a8305c"/><circle cx="4" cy="-20" r="1.2" fill="#a8305c"/><circle cx="-6" cy="-24" r="1.1" fill="#a8305c"/>
        </g>
        <circle cx="0" cy="0" r="7.5" fill="#f2a44c"/>
      </g>

      <g transform="translate(172,98) rotate(16)">
        <g>
          <ellipse cx="0" cy="-32" rx="10" ry="34" fill="url(#petalFill)" transform="rotate(0)"/>
          <ellipse cx="0" cy="-32" rx="10" ry="34" fill="url(#petalFill)" transform="rotate(60)"/>
          <ellipse cx="0" cy="-32" rx="10" ry="34" fill="url(#petalFill)" transform="rotate(120)"/>
          <ellipse cx="0" cy="-32" rx="10" ry="34" fill="url(#petalFill)" transform="rotate(180)"/>
          <ellipse cx="0" cy="-32" rx="10" ry="34" fill="url(#petalFill)" transform="rotate(240)"/>
          <ellipse cx="0" cy="-32" rx="10" ry="34" fill="url(#petalFill)" transform="rotate(300)"/>
          <circle cx="-3" cy="-13" r="1.3" fill="#a8305c"/><circle cx="4" cy="-19" r="1.1" fill="#a8305c"/>
        </g>
        <circle cx="0" cy="0" r="6.5" fill="#f2a44c"/>
      </g>
    </symbol>
  </defs>
</svg>

<!-- persistent background layers, live behind every scene -->
<div class="sky">
  <div class="stars"></div>
  <div class="stars stars--far"></div>
  <div class="moon" aria-hidden="true"></div>
</div>

<!-- falling petals layer, activated once the bouquet is delivered -->
<div class="petals" id="petals" aria-hidden="true"></div>

<!-- the lily bouquet stays pinned on screen once she's received it -->
<svg class="kept-lilies" id="kept-lilies" viewBox="0 0 240 280" aria-hidden="true"><use href="#lily-bouquet"></use></svg>

<!-- background music: plays once while the letter is being read, then fades out -->
<audio id="bg-music" src="music.mp3" preload="none"></audio>
<button id="music-toggle" class="music-toggle" aria-label="Mute music" hidden>
  <span class="music-toggle__icon">♪</span>
</button>

<main id="stage">

  <!-- SCENE 0 — start gate (needed so audio/vibration are allowed to play) -->
  <section class="scene scene--active" id="scene-0" data-scene="0">
    <div class="scene__inner">
      <p class="eyebrow">for you</p>
      <h1 class="script-heading">A Special Delivery</h1>
      <button class="btn btn--primary" data-next>Open</button>
    </div>
  </section>

  <!-- SCENE 1 — welcome -->
  <section class="scene" id="scene-1" data-scene="1">
    <div class="scene__inner">
      <p class="welcome-line">A Special Delivery is on its way&hellip;</p>
    </div>
  </section>

  <!-- SCENE 2 — postman: walks in, gives lilies, gives envelope, waves, leaves -->
  <section class="scene" id="scene-2" data-scene="2">
    <div class="scene__inner scene__inner--ground">
      <div class="speech-bubble" id="speech-bubble">
        <p id="speech-text"></p>
      </div>
      <button class="postman-hit" id="postman-hit" aria-label="Tap the postman">
        <div class="postman-wrap" id="postman-wrap">
          <svg id="postman" class="postman" viewBox="0 0 200 260" role="img" aria-label="A postman carrying a letter and lilies">
            <g id="leg-back" class="limb"><rect x="78" y="158" width="20" height="70" rx="9" fill="#5b6b8c"/><rect x="76" y="222" width="26" height="12" rx="5" fill="#2f2b52"/></g>
            <g id="arm-back" class="limb"><rect x="60" y="96" width="16" height="58" rx="8" fill="#6e4b3a"/><circle cx="68" cy="154" r="9" fill="#e8c9a8"/></g>
            <g id="bag"><path d="M40,150 L58,90" stroke="#8a5a3c" stroke-width="6" stroke-linecap="round"/><rect x="30" y="150" width="56" height="62" rx="10" fill="#8a5a3c"/><rect x="30" y="150" width="56" height="16" rx="8" fill="#a06c48"/><rect x="46" y="168" width="24" height="18" rx="3" fill="#f3e6cf"/></g>
            <path id="body" d="M70,70 Q100,52 130,70 L142,160 Q100,176 58,160 Z" fill="#6e4b3a"/>
            <path d="M70,70 Q100,52 130,70 L127,86 Q100,72 73,86 Z" fill="#8a5a3c"/>
            <circle cx="100" cy="98" r="3" fill="#f0dfa8"/><circle cx="100" cy="114" r="3" fill="#f0dfa8"/><circle cx="100" cy="130" r="3" fill="#f0dfa8"/>
            <circle id="head" cx="100" cy="44" r="24" fill="#e8c9a8"/>
            <path id="smile" d="M89,50 Q100,59 111,50" fill="none" stroke="#8a5a3c" stroke-width="2.4" stroke-linecap="round"/>
            <circle cx="90" cy="40" r="2.2" fill="#5b4636"/><circle cx="110" cy="40" r="2.2" fill="#5b4636"/>
            <g id="hat"><path d="M74,36 Q100,10 126,36 L126,40 L74,40 Z" fill="#2f2b52"/><rect x="70" y="36" width="60" height="8" rx="4" fill="#3b3768"/><ellipse cx="118" cy="40" rx="14" ry="5" fill="#1b1f3b"/><circle cx="100" cy="18" r="4" fill="#d9b872"/></g>
            <g id="leg-front" class="limb"><rect x="102" y="158" width="20" height="70" rx="9" fill="#4a5a7a"/><rect x="100" y="222" width="26" height="12" rx="5" fill="#20233f"/></g>
            <!-- bouquet, held in his back hand -->
            <g transform="translate(30,72)">
              <g id="postman-lilies" class="postman-lilies">
                <use href="#lily-bouquet" transform="scale(0.34)"></use>
              </g>
            </g>
            <g id="arm-front" class="limb"><rect x="122" y="96" width="16" height="52" rx="8" fill="#8a5a3c"/><circle cx="130" cy="146" r="9" fill="#e8c9a8"/></g>
            <g id="hand-envelope" transform="translate(118,132)"><rect x="0" y="0" width="30" height="20" rx="2" fill="#faf3e4" stroke="#d9b872" stroke-width="1"/><path d="M0,0 L15,12 L30,0" fill="none" stroke="#d9b872" stroke-width="1.2"/></g>
          </svg>
        </div>
      </button>
      <p class="caption caption--tap" id="postman-prompt">Tap the postman</p>
    </div>
  </section>

  <!-- SCENE 3 — envelope alone, tap to open -->
  <section class="scene" id="scene-3" data-scene="3">
    <div class="scene__inner">
      <button class="envelope-hit" id="envelope-hit" aria-label="Pick up the envelope">
        <div class="envelope" id="envelope">
          <div class="envelope__back"></div>
          <div class="envelope__letter-peek"></div>
          <div class="envelope__front"></div>
          <div class="envelope__flap" id="envelope-flap"></div>
          <div class="envelope__seal" id="envelope-seal"></div>
          <span class="sticker sticker--heart sticker--env-tl" aria-hidden="true">♡</span>
          <span class="sticker sticker--flower sticker--env-br" aria-hidden="true">✿</span>
          <span class="washi-tape" aria-hidden="true"></span>
        </div>
      </button>
      <p class="caption caption--tap">Tap the envelope to open it</p>
    </div>
  </section>

  <!-- SCENE 4 — letter, typewriter -->
  <section class="scene" id="scene-4" data-scene="4">
    <div class="scene__inner scene__inner--letter">
      <div class="letter-paper" id="letter-paper">
        <span class="sticker sticker--heart sticker--letter-tr" aria-hidden="true">♡</span>
        <span class="sticker sticker--flower sticker--letter-bl" aria-hidden="true">✿</span>
        <span class="sticker sticker--star sticker--letter-tl" aria-hidden="true">✦</span>
        <p class="letter-greeting" id="letter-greeting"></p>
        <p class="letter-body" id="letter-body"></p>
        <p class="letter-signoff" id="letter-signoff"></p>
      </div>
      <button class="btn btn--ghost" data-next id="after-letter-btn" hidden>Continue</button>
    </div>
  </section>

  <!-- SCENE 5 — since our paths crossed -->
  <section class="scene" id="scene-5" data-scene="5">
    <div class="scene__inner">
      <div class="timer-card">
        <div class="timer-card__petal timer-card__petal--tl" aria-hidden="true"></div>
        <div class="timer-card__petal timer-card__petal--br" aria-hidden="true"></div>
        <p class="timer-card__eyebrow">every second with you &#9825;</p>
        <div class="timer" id="timer">
          <div class="timer__unit"><span class="timer__value" id="t-years">0</span><span class="timer__label">years</span></div>
          <div class="timer__unit"><span class="timer__value" id="t-months">0</span><span class="timer__label">months</span></div>
          <div class="timer__unit"><span class="timer__value" id="t-days">0</span><span class="timer__label">days</span></div>
          <div class="timer__unit"><span class="timer__value" id="t-hours">0</span><span class="timer__label">hours</span></div>
          <div class="timer__unit"><span class="timer__value" id="t-minutes">0</span><span class="timer__label">minutes</span></div>
          <div class="timer__unit"><span class="timer__value" id="t-seconds">0</span><span class="timer__label">seconds</span></div>
        </div>
        <p class="timer-card__caption" id="timer-caption"></p>
      </div>
      <button class="btn btn--ghost" data-next>Continue</button>
    </div>
  </section>

  <!-- SCENE 6 — one more thing -->
  <section class="scene" id="scene-6" data-scene="6">
    <div class="scene__inner">
      <p class="eyebrow">one more thing&hellip;</p>
      <div class="link-row">
        <a class="btn btn--link" id="playlist-link" href="#" target="_blank" rel="noopener">
          <svg class="btn__icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="12" fill="#1DB954"/>
            <path d="M6.5 9.5c3.2-.9 7.4-.7 10 .8" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <path d="M6.8 12.6c2.7-.7 6.2-.5 8.5.7" stroke="#fff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <path d="M7.2 15.6c2.2-.5 5-.4 6.9.6" stroke="#fff" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          </svg>
          Our Playlist
        </a>
        <button class="btn btn--link" id="final-note-btn">
          <svg class="btn__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 20 C6 15 2 11.5 2 7.8 2 5 4.2 3 6.8 3 8.6 3 10.3 4 12 6 13.7 4 15.4 3 17.2 3 19.8 3 22 5 22 7.8 22 11.5 18 15 12 20Z" fill="#e8b7c2"/>
          </svg>
          Final Note
        </button>
        <a class="btn btn--link" id="tiktok-link" href="#" target="_blank" rel="noopener">
          <svg class="btn__icon" viewBox="0 0 24 24" aria-hidden="true">
            <g transform="translate(0.5,0.5)">
              <path d="M15.5 2 C15.9 4.4 17.4 6 19.8 6.3 V9.4 C18.1 9.4 16.6 8.9 15.5 8 V15.3 C15.5 18.4 13 20.9 9.9 20.9 6.8 20.9 4.3 18.4 4.3 15.3 4.3 12.2 6.8 9.7 9.9 9.7 10.3 9.7 10.7 9.7 11.1 9.8 V13 C10.7 12.8 10.3 12.7 9.9 12.7 8.5 12.7 7.3 13.9 7.3 15.3 7.3 16.7 8.5 17.9 9.9 17.9 11.3 17.9 12.5 16.8 12.5 15.3 V2 Z" fill="#12121a"/>
            </g>
          </svg>
          TikTok
        </a>
      </div>
      <button class="btn btn--ghost" data-next>Continue</button>
    </div>

    <!-- final note modal -->
    <div class="modal" id="final-note-modal" hidden>
      <div class="modal__card">
        <p class="modal__text" id="final-note-text"></p>
        <button class="btn btn--ghost" id="final-note-close">Close</button>
      </div>
    </div>
  </section>

  <!-- SCENE 7 — ending -->
  <section class="scene" id="scene-7" data-scene="7">
    <div class="scene__inner">
      <p class="closing-line">This letter may end here&hellip;</p>
      <p class="closing-line closing-line--emph">But my feelings don&rsquo;t.</p>
      <button class="btn btn--ghost btn--restart" id="restart-btn">Read it again</button>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
